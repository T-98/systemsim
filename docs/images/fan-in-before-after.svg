<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="-apple-system, Inter, sans-serif">
  <style>
    .bg { fill: #ffffff; }
    .title { font-size: 18px; font-weight: 600; fill: #1d1d1f; letter-spacing: -0.32px; }
    .subtitle { font-size: 13px; fill: rgba(0,0,0,0.48); letter-spacing: -0.12px; }
    .divider { stroke: rgba(0,0,0,0.08); stroke-width: 1; }
    .node { fill: #f5f5f7; stroke: rgba(0,0,0,0.12); stroke-width: 1; }
    .node-text { font-size: 13px; font-weight: 500; fill: #1d1d1f; text-anchor: middle; letter-spacing: -0.12px; }
    .wire { stroke: rgba(0,0,0,0.4); stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
    .wire-red { stroke: #ff3b30; stroke-width: 2; fill: none; marker-end: url(#arrow-red); }
    .wire-green { stroke: #34c759; stroke-width: 2; fill: none; marker-end: url(#arrow-green); }
    .label { font-size: 11px; fill: rgba(0,0,0,0.48); letter-spacing: -0.12px; }
    .anno { font-size: 12px; fill: rgba(0,0,0,0.8); letter-spacing: -0.12px; }
    .anno-bad { font-size: 12px; fill: #ff3b30; font-weight: 500; letter-spacing: -0.12px; }
    .anno-good { font-size: 12px; fill: #0071e3; font-weight: 500; letter-spacing: -0.12px; }
    .mono { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; fill: rgba(0,0,0,0.8); }
    .mono-red { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; fill: #ff3b30; }
    .mono-blue { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; fill: #0071e3; }
    .panel { fill: #fafafc; stroke: rgba(0,0,0,0.08); stroke-width: 1; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="rgba(0,0,0,0.4)"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#ff3b30"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#34c759"/>
    </marker>
  </defs>

  <rect class="bg" width="1200" height="640"/>

  <!-- Divider between panels -->
  <line class="divider" x1="600" y1="40" x2="600" y2="620"/>

  <!-- ============================================================= -->
  <!-- LEFT PANEL: BEFORE                                             -->
  <!-- ============================================================= -->
  <text class="title" x="40" y="40">Before — last-invocation bias</text>
  <text class="subtitle" x="40" y="62">Two inbound wires → processComponent(DB) runs twice per tick. Last write wins.</text>

  <!-- Topology -->
  <g transform="translate(40, 90)">
    <!-- SRV-A -->
    <rect class="node" x="0" y="60" width="100" height="44" rx="8"/>
    <text class="node-text" x="50" y="87">SRV-A</text>

    <!-- SRV-B -->
    <rect class="node" x="0" y="160" width="100" height="44" rx="8"/>
    <text class="node-text" x="50" y="187">SRV-B</text>

    <!-- DB -->
    <rect class="node" x="280" y="110" width="100" height="44" rx="8"/>
    <text class="node-text" x="330" y="137">DB</text>

    <!-- Wires -->
    <path class="wire" d="M 100 82 Q 190 82 280 122"/>
    <path class="wire" d="M 100 182 Q 190 182 280 142"/>

    <text class="label" x="160" y="78">e_A</text>
    <text class="label" x="160" y="198">e_B</text>
  </g>

  <!-- Call sequence -->
  <g transform="translate(40, 340)">
    <rect class="panel" x="0" y="0" width="520" height="270" rx="8"/>
    <text class="anno" x="16" y="24" font-weight="500">tick() — recursive forwardOverWire</text>

    <text class="mono" x="16" y="52">processComponent(LB)</text>
    <text class="mono" x="16" y="72">  → forwardOverWire(LB → SRV-A, 20rps)</text>
    <text class="mono" x="16" y="92">    → processComponent(SRV-A)</text>
    <text class="mono" x="16" y="112">      → forwardOverWire(SRV-A → DB, 20rps)</text>
    <text class="mono" x="16" y="132">        → processComponent(DB, 20rps)  # run 1</text>
    <text class="mono-red" x="16" y="152">        → DB.metrics.errorRate = e_A     # write 1</text>
    <text class="mono" x="16" y="172">  → forwardOverWire(LB → SRV-B, 20rps)</text>
    <text class="mono" x="16" y="192">    → processComponent(DB, 20rps)    # run 2</text>
    <text class="mono-red" x="16" y="212">    → DB.metrics.errorRate = e_B        # OVERWRITES e_A</text>
    <text class="mono" x="16" y="236">end-of-tick:</text>
    <text class="mono-red" x="16" y="256">  evaluateBreakers reads e_B only (both wires biased)</text>
  </g>

  <!-- ============================================================= -->
  <!-- RIGHT PANEL: AFTER                                             -->
  <!-- ============================================================= -->
  <text class="title" x="640" y="40">After — one call per component, aggregate signals</text>
  <text class="subtitle" x="640" y="62">Topological order schedules processors once; every inbound sees the same aggregate.</text>

  <!-- Topology -->
  <g transform="translate(640, 90)">
    <!-- SRV-A -->
    <rect class="node" x="0" y="60" width="100" height="44" rx="8"/>
    <text class="node-text" x="50" y="87">SRV-A</text>

    <!-- SRV-B -->
    <rect class="node" x="0" y="160" width="100" height="44" rx="8"/>
    <text class="node-text" x="50" y="187">SRV-B</text>

    <!-- DB -->
    <rect class="node" x="280" y="110" width="100" height="44" rx="8"/>
    <text class="node-text" x="330" y="137">DB</text>

    <!-- Green wires = aggregate-correct -->
    <path class="wire-green" d="M 100 82 Q 190 82 280 122"/>
    <path class="wire-green" d="M 100 182 Q 190 182 280 142"/>

    <text class="label" x="155" y="78">+20 rps → inboundRps[DB]</text>
    <text class="label" x="155" y="200">+20 rps → inboundRps[DB]</text>

    <!-- Aggregate badge -->
    <rect x="270" y="170" width="120" height="26" rx="13" fill="rgba(0,113,227,0.08)" stroke="#0071e3" stroke-opacity="0.2"/>
    <text class="anno-good" x="330" y="187" text-anchor="middle">Σ = 40 rps aggregate</text>
  </g>

  <!-- Call sequence -->
  <g transform="translate(640, 340)">
    <rect class="panel" x="0" y="0" width="520" height="270" rx="8"/>
    <text class="anno" x="16" y="24" font-weight="500">tick() — 3-phase topological scheduler</text>

    <text class="mono" x="16" y="52">Phase A — topologicalOrder → [LB, SRV-A, SRV-B, DB]</text>
    <text class="mono" x="16" y="76">Phase B — one runComponent per node, in order:</text>
    <text class="mono" x="16" y="96">  runComponent(LB)    emits → inboundRps[SRV-*]</text>
    <text class="mono" x="16" y="116">  runComponent(SRV-A) emits → inboundRps[DB] += 20</text>
    <text class="mono" x="16" y="136">  runComponent(SRV-B) emits → inboundRps[DB] += 20</text>
    <text class="mono-blue" x="16" y="156">  runComponent(DB, 40)   # single call, single write</text>
    <text class="mono-blue" x="16" y="176">  DB.metrics.errorRate = e_agg   (TRUE aggregate)</text>
    <text class="mono" x="16" y="204">Phase C — end-of-tick observe:</text>
    <text class="mono-blue" x="16" y="224">  wire(SRV-A→DB).lastObservedErrorRate = e_agg</text>
    <text class="mono-blue" x="16" y="244">  wire(SRV-B→DB).lastObservedErrorRate = e_agg   (same)</text>
  </g>
</svg>
